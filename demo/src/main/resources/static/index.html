<!DOCTYPE html>
<html>

<head>
    <title>Product Management</title>
</head>

<body>

<h1>Product Management</h1>


<h2>Add Product</h2>


<form id="productForm">


    Name:
    <input type="text" id="name" required>
    <br><br>


    Description:
    <input type="text" id="description">
    <br><br>


    Price:
    <input type="number" id="price" required>
    <br><br>


    Category:
    <input type="text" id="category">
    <br><br>


    <button type="submit">
        Add Product
    </button>


</form>


<h3 id="message"></h3>


<hr>


<h2>All Products</h2>


<button onclick="getProducts()">
    Show Products
</button>


<br><br>


<table border="1">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Price</th>
<th>Category</th>

</tr>

</thead>


<tbody id="productTable">

</tbody>


</table>



<script src="script.js"></script>


</body>

</html>
